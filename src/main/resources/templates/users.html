<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head th:replace="~{fragments/layout :: head('Users')}"></head>
<body class="app-body">

<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="app-layout">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main class="main-content">

        <div class="page-header">
            <h1>User management</h1>
            <button class="btn btn-primary"
                    onclick="toggleForm('createUserForm')">+ New user</button>
        </div>

        <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
        <div th:if="${errorMsg}"   class="alert alert-danger"  th:text="${errorMsg}"></div>


        <div id="createUserForm" class="form-card" style="display:none">
            <h2>New user</h2>
            <form th:action="@{/users/create}" method="post"
                  th:object="${newUser}" class="inline-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-row">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" th:field="*{email}"
                               placeholder="user@company.com" required/>
                        <span class="field-error"
                              th:if="${#fields.hasErrors('email')}"
                              th:errors="*{email}"></span>
                    </div>
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" th:field="*{name}"
                               placeholder="Full name" required/>
                        <span class="field-error"
                              th:if="${#fields.hasErrors('name')}"
                              th:errors="*{name}"></span>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" th:field="*{password}"
                               placeholder="Min 6 characters" required/>
                        <span class="field-error"
                              th:if="${#fields.hasErrors('password')}"
                              th:errors="*{password}"></span>
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <select th:field="*{role}" required>
                            <option value="">Select role</option>
                            <option th:each="r : ${roles}"
                                    th:value="${r}"
                                    th:text="${r}">ROLE</option>
                        </select>
                        <span class="field-error"
                              th:if="${#fields.hasErrors('role')}"
                              th:errors="*{role}"></span>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Create user</button>
                    <button type="button" class="btn btn-outline"
                            onclick="toggleForm('createUserForm')">Cancel</button>
                </div>
            </form>
        </div>


        <div class="table-card">
            <table class="data-table">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Created</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.name}">—</td>
                    <td th:text="${u.email}">—</td>
                    <td>
            <span class="badge"
                  th:classappend="${u.role.name() == 'ADMIN'}   ? ' badge-admin'   :
                                  (${u.role.name() == 'ANALYST'} ? ' badge-analyst' :
                                                                   ' badge-viewer')"
                  th:text="${u.role}">—</span>
                    </td>
                    <td>
            <span class="badge"
                  th:classappend="${u.active} ? ' badge-active' : ' badge-inactive'"
                  th:text="${u.active} ? 'Active' : 'Inactive'">—</span>
                    </td>
                    <td th:text="${u.createdAt != null}
                        ? ${#temporals.format(u.createdAt, 'dd MMM yyyy')}
                        : '—'">—</td>
                    <td class="actions-cell">

                        <form th:action="@{/users/{id}/role(id=${u.id})}"
                              method="post"
                              style="display:inline-flex;gap:6px;align-items:center">
                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}"/>
                            <select name="role" class="select-sm">
                                <option th:each="r : ${roles}"
                                        th:value="${r}"
                                        th:text="${r}"
                                        th:selected="${r == u.role}">ROLE</option>
                            </select>
                            <button type="submit" class="btn btn-sm btn-secondary">Update</button>
                        </form>

                        <form th:action="@{/users/{id}/toggle(id=${u.id})}"
                              method="post"
                              style="display:inline"
                              th:onsubmit="${u.active}
                      ? 'return confirm(\'Deactivate this user?\')'
                      : 'return confirm(\'Activate this user?\')'">
                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}"/>
                            <button type="submit"
                                    class="btn btn-sm"
                                    th:classappend="${u.active} ? ' btn-danger' : ' btn-success'"
                                    th:text="${u.active} ? 'Deactivate' : 'Activate'">Toggle</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${users == null or users.empty}">
                    <td colspan="6" class="empty-row">No users found.</td>
                </tr>
                </tbody>
            </table>
        </div>

    </main>
</div>

<script>
    function toggleForm(id) {
      const el = document.getElementById(id);
      el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }
</script>
</body>
</html>
