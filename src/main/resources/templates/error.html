<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Error</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="login-body">
<div class="login-card" style="width:520px">
    <div class="login-logo" style="background:#A32D2D">!</div>
    <h1 class="login-title" th:text="${status} + ' Error'">Error</h1>
    <p class="login-sub" th:text="${error}">Something went wrong</p>
    <div class="alert alert-danger" th:text="${message}">Details here</div>
    <div style="margin-top:12px;font-size:12px;color:#6b7280"
         th:text="'Path: ' + ${path}"></div>
    <a th:href="@{/dashboard}" class="btn btn-outline" style="margin-top:16px">
        Back to dashboard
    </a>
</div>
</body>
</html>
