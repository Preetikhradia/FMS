<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head th:replace="~{fragments/layout :: head('Records')}"></head>
<body class="app-body">

<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="app-layout">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main class="main-content">

        <div class="page-header">
            <h1>Financial records</h1>
            <div sec:authorize="hasRole('ADMIN')">
                <button class="btn btn-primary" onclick="toggleForm('createForm')">+ New record</button>
            </div>
        </div>

        <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
        <div th:if="${errorMsg}"   class="alert alert-danger"  th:text="${errorMsg}"></div>


        <div sec:authorize="hasRole('ADMIN')">
            <div id="createForm" class="form-card" style="display:none">
                <h2 id="formHeading">New record</h2>
                <form id="recordForm" onsubmit="return handleFormSubmit(event)"
                      th:object="${newRecord}" class="inline-form">
                    <input type="hidden" id="csrfToken" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" id="recordId" name="recordId" value=""/>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Amount</label>
                            <input type="number" step="0.01" min="0.01" id="inputAmount"
                                   th:field="*{amount}" placeholder="0.00" required/>
                            <span class="field-error"
                                  th:if="${#fields.hasErrors('amount')}"
                                  th:errors="*{amount}"></span>
                        </div>
                        <div class="form-group">
                            <label>Type</label>
                            <select id="inputType" th:field="*{type}" required>
                                <option value="">Select type</option>
                                <option th:each="t : ${types}"
                                        th:value="${t}"
                                        th:text="${t}">TYPE</option>
                            </select>
                            <span class="field-error"
                                  th:if="${#fields.hasErrors('type')}"
                                  th:errors="*{type}"></span>
                        </div>
                        <div class="form-group">
                            <label>Category</label>
                            <input type="text" id="inputCategory" th:field="*{category}"
                                   placeholder="e.g. Salary" required/>
                            <span class="field-error"
                                  th:if="${#fields.hasErrors('category')}"
                                  th:errors="*{category}"></span>
                        </div>
                        <div class="form-group">
                            <label>Date</label>
                            <input type="date" id="inputDate" th:field="*{date}" required/>
                            <span class="field-error"
                                  th:if="${#fields.hasErrors('date')}"
                                  th:errors="*{date}"></span>
                        </div>
                        <div class="form-group form-group-wide">
                            <label>Notes</label>
                            <input type="text" id="inputNotes" th:field="*{notes}"
                                   placeholder="Optional notes"/>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Save record</button>
                        <button type="button" class="btn btn-outline"
                                onclick="toggleForm('createForm')">Cancel</button>
                        <button type="button" id="cancelEditBtn" class="btn btn-outline"
                                onclick="cancelEdit()" style="display:none">Cancel Edit</button>
                    </div>
                </form>
            </div>
        </div>

        <form th:action="@{/records}" method="get"
              th:object="${filter}" class="filter-bar">
            <select th:field="*{type}">
                <option value="">All types</option>
                <option th:each="t : ${types}"
                        th:value="${t}"
                        th:text="${t}">TYPE</option>
            </select>
            <input type="text"  th:field="*{category}" placeholder="Category"/>
            <input type="date"  th:field="*{from}"/>
            <input type="date"  th:field="*{to}"/>
            <button type="submit" class="btn btn-secondary">Filter</button>
            <a th:href="@{/records}" class="btn btn-outline">Clear</a>
        </form>


        <div class="table-card">
            <table class="data-table">
                <thead>
                <tr>
                    <th>Date</th>
                    <th>Category</th>
                    <th>Type</th>
                    <th>Amount</th>
                    <th>Notes</th>
                    <th>Created by</th>
                    <th sec:authorize="hasRole('ADMIN')">Actions</th>
                </tr>
                </thead>
                <tbody th:if="${page != null}">
                <tr th:each="rec : ${page.content}">
                    <td th:text="${rec.date}">—</td>
                    <td th:text="${rec.category}">—</td>
                    <td>
            <span class="badge"
                  th:classappend="${rec.type != null and rec.type.name() == 'INCOME'}
                                  ? ' badge-income' : ' badge-expense'"
                  th:text="${rec.type}">—</span>
                    </td>
                    <td th:text="'₹ ' + ${#numbers.formatDecimal(
                        rec.amount, 1, 'COMMA', 2, 'POINT')}">—</td>
                    <td th:text="${rec.notes != null ? rec.notes : '—'}">—</td>
                    <td th:text="${rec.createdBy}">—</td>
                    <td sec:authorize="hasRole('ADMIN')" class="actions-cell">
                        <button type="button" class="btn btn-sm btn-warning"
                                th:data-id="${rec.id}"
                                th:data-amount="${rec.amount}"
                                th:data-type="${rec.type}"
                                th:data-category="${rec.category}"
                                th:data-date="${rec.date}"
                                th:data-notes="${rec.notes}"
                                onclick="editRecord(this)">
                            Edit
                        </button>
                        <form th:action="@{/records/{id}/delete(id=${rec.id})}"
                              method="post" style="display:inline"
                              onsubmit="return confirm('Delete this record?')">
                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${page.content.empty}">
                    <td colspan="7" class="empty-row">No records match your filter.</td>
                </tr>
                </tbody>
                <tbody th:if="${page == null}">
                <tr><td colspan="7" class="empty-row">Could not load records.</td></tr>
                </tbody>
            </table>


            <div class="pagination"
                 th:if="${page != null and page.totalPages > 1}">
                <a th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
                   th:href="@{/records(page=${i},
                             size=${filter.size},
                             type=${filter.type},
                             category=${filter.category},
                             from=${filter.from},
                             to=${filter.to})}"
                   th:text="${i + 1}"
                   th:classappend="${i == page.number} ? ' page-active'"
                   class="page-btn">1</a>
            </div>
        </div>

    </main>
</div>

<script>

    window.addEventListener('DOMContentLoaded', function() {
      const urlParams = new URLSearchParams(window.location.search);
      const successMsg = urlParams.get('success');
      if (successMsg) {

        const mainContent = document.querySelector('.main-content');
        const pageHeader = document.querySelector('.page-header');
        const alert = document.createElement('div');
        alert.className = 'alert alert-success';
        alert.textContent = successMsg;
        mainContent.insertBefore(alert, pageHeader.nextSibling);


        window.history.replaceState({}, '', window.location.pathname);
      }
    });

    function toggleForm(id) {
      const el = document.getElementById(id);
      el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    function editRecord(button) {

      const id = button.dataset.id;
      const amount = button.dataset.amount;
      const type = button.dataset.type;
      const category = button.dataset.category;
      const date = button.dataset.date;
      const notes = button.dataset.notes || '';


      const form = document.getElementById('createForm');
      form.style.display = 'block';


      document.getElementById('formHeading').textContent = 'Edit Record';


      document.getElementById('inputAmount').value = amount;
      document.getElementById('inputType').value = type;
      document.getElementById('inputCategory').value = category;
      document.getElementById('inputDate').value = date;
      document.getElementById('inputNotes').value = notes;


      document.getElementById('recordId').value = id;


      document.getElementById('cancelEditBtn').style.display = 'inline-block';
      document.querySelector('.form-actions .btn-outline:not(#cancelEditBtn)').style.display = 'none';


      form.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function cancelEdit() {

      const form = document.getElementById('recordForm');
      form.reset();


      document.getElementById('recordId').value = '';


      document.getElementById('formHeading').textContent = 'New record';


      document.getElementById('cancelEditBtn').style.display = 'none';
      document.querySelector('.form-actions .btn-outline:not(#cancelEditBtn)').style.display = 'inline-block';


      document.getElementById('createForm').style.display = 'none';
    }

    async function handleFormSubmit(event) {
      event.preventDefault();


      const amount = document.getElementById('inputAmount').value;
      const type = document.getElementById('inputType').value;
      const category = document.getElementById('inputCategory').value;
      const date = document.getElementById('inputDate').value;
      const notes = document.getElementById('inputNotes').value;
      const recordId = document.getElementById('recordId').value;


      if (!amount || !type || !category || !date) {
        alert('Please fill in all required fields');
        return false;
      }

      const requestBody = {
        amount: parseFloat(amount),
        type: type,
        category: category,
        date: date,
        notes: notes || null
      };


      const isUpdate = recordId && recordId !== '';
      const url = isUpdate ? `/api/records/${recordId}` : '/api/records';
      const method = isUpdate ? 'PUT' : 'POST';


      const csrfToken = document.getElementById('csrfToken').value;

      try {
        const response = await fetch(url, {
          method: method,
          headers: {
            'Content-Type': 'application/json',
            'X-CSRF-TOKEN': csrfToken
          },
          body: JSON.stringify(requestBody)
        });

        if (response.ok) {

          const message = isUpdate ? 'Record updated successfully.' : 'Record created successfully.';
          window.location.href = '/records?success=' + encodeURIComponent(message);
        } else {

          const errorData = await response.json();
          alert('Error: ' + (errorData.message || 'Failed to save record'));
        }
      } catch (error) {
        console.error('Error submitting form:', error);
        alert('Error: Could not save record. Please try again.');
      }

      return false;
    }
</script>
</body>
</html>
