<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head th:replace="~{fragments/layout :: head('Records')}"></head>
<body class="app-body">

<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="app-layout">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main class="main-content">

        <div class="page-header">
            <h1>Financial records</h1>
            <sec:authorize access="hasRole('ADMIN')">
                <button class="btn btn-primary" onclick="toggleForm('createForm')">+ New record</button>
            </sec:authorize>
        </div>

        <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
        <div th:if="${errorMsg}"   class="alert alert-danger"  th:text="${errorMsg}"></div>

        <!-- Create form (admin only) -->
        <sec:authorize access="hasRole('ADMIN')">
            <div id="createForm" class="form-card" style="display:none">
                <h2>New record</h2>
                <form th:action="@{/records/create}" method="post"
                      th:object="${newRecord}" class="inline-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Amount</label>
                            <input type="number" step="0.01" min="0.01"
                                   th:field="*{amount}" placeholder="0.00" required/>
                            <span class="field-error" th:if="${#fields.hasErrors('amount')}"
                                  th:errors="*{amount}"></span>
                        </div>
                        <div class="form-group">
                            <label>Type</label>
                            <select th:field="*{type}" required>
                                <option value="">Select type</option>
                                <option th:each="t : ${types}" th:value="${t}" th:text="${t}">TYPE</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Category</label>
                            <input type="text" th:field="*{category}" placeholder="e.g. Salary" required/>
                        </div>
                        <div class="form-group">
                            <label>Date</label>
                            <input type="date" th:field="*{date}" required/>
                        </div>
                        <div class="form-group form-group-wide">
                            <label>Notes</label>
                            <input type="text" th:field="*{notes}" placeholder="Optional notes"/>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Save</button>
                        <button type="button" class="btn btn-outline"
                                onclick="toggleForm('createForm')">Cancel</button>
                    </div>
                </form>
            </div>
        </sec:authorize>

        <!-- Filter bar -->
        <form th:action="@{/records}" method="get" th:object="${filter}" class="filter-bar">
            <select th:field="*{type}">
                <option value="">All types</option>
                <option th:each="t : ${types}" th:value="${t}" th:text="${t}">TYPE</option>
            </select>
            <input type="text" th:field="*{category}" placeholder="Category"/>
            <input type="date" th:field="*{from}"/>
            <input type="date" th:field="*{to}"/>
            <button type="submit" class="btn btn-secondary">Filter</button>
            <a th:href="@{/records}" class="btn btn-outline">Clear</a>
        </form>

        <!-- Records table -->
        <div class="table-card">
            <table class="data-table">
                <thead>
                <tr>
                    <th>Date</th><th>Category</th><th>Type</th>
                    <th>Amount</th><th>Notes</th><th>Created by</th>
                    <sec:authorize access="hasRole('ADMIN')"><th>Actions</th></sec:authorize>
                </tr>
                </thead>
                <tbody>
                <tr th:each="rec : ${page.content}">
                    <td th:text="${rec.date}">—</td>
                    <td th:text="${rec.category}">—</td>
                    <td>
            <span class="badge"
                  th:classappend="${rec.type.name()=='INCOME'} ? 'badge-income' : 'badge-expense'"
                  th:text="${rec.type}">—</span>
                    </td>
                    <td th:text="'₹ ' + ${#numbers.formatDecimal(rec.amount,1,'COMMA',2,'POINT')}">—</td>
                    <td th:text="${rec.notes ?: '—'}">—</td>
                    <td th:text="${rec.createdBy}">—</td>
                    <sec:authorize access="hasRole('ADMIN')">
                        <td>
                            <form th:action="@{/records/{id}/delete(id=${rec.id})}"
                                  method="post" style="display:inline"
                                  onsubmit="return confirm('Delete this record?')">
                                <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                            </form>
                        </td>
                    </sec:authorize>
                </tr>
                <tr th:if="${page.content.empty}">
                    <td colspan="7" class="empty-row">No records match your filter.</td>
                </tr>
                </tbody>
            </table>

            <!-- Pagination -->
            <div class="pagination" th:if="${page.totalPages > 1}">
                <a th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
                   th:href="@{/records(page=${i}, size=${filter.size}, type=${filter.type},
                              category=${filter.category}, from=${filter.from}, to=${filter.to})}"
                   th:text="${i + 1}"
                   th:classappend="${i == page.number} ? 'page-active'"
                   class="page-btn">1</a>
            </div>
        </div>

    </main>
</div>

<script>
    function toggleForm(id) {
      const el = document.getElementById(id);
      el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }
</script>
</body>
</html>
