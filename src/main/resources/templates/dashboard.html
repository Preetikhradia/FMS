<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">

<head th:replace="~{fragments/layout :: head('Dashboard')}"></head>

<body class="app-body">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="app-layout">

    <aside th:replace="~{fragments/layout :: sidebar}"></aside>

    <main class="main-content">

        <div class="page-header">
            <h1>Dashboard</h1>
            <form th:action="@{/dashboard}" method="get" style="display:inline">
                <select name="months" class="select-sm" onchange="this.form.submit()">
                    <option th:each="m : ${#numbers.sequence(1,12)}"
                            th:value="${m}"
                            th:text="${m} + ' months'"
                            th:selected="${m == months}">
                    </option>
                </select>
            </form>
        </div>

        <div th:if="${successMsg}" class="alert alert-success">
            <span th:text="${successMsg}"></span>
        </div>

        <div th:if="${errorMsg}" class="alert alert-danger">
            <span th:text="${errorMsg}"></span>
        </div>

        <div th:if="${vm != null}">

            <div class="cards-grid">

                <div class="card card-income">
                    <div class="card-label">Total income</div>
                    <div class="card-value">
                        <span>&#8377; </span>
                        <span th:text="${vm.totalIncome}">0.00</span>
                    </div>
                </div>

                <div class="card card-expense">
                    <div class="card-label">Total expenses</div>
                    <div class="card-value">
                        <span>&#8377; </span>
                        <span th:text="${vm.totalExpenses}">0.00</span>
                    </div>
                </div>

                <div th:if="${vm.netPositive}" class="card card-net-pos">
                    <div class="card-label">Net balance</div>
                    <div class="card-value">
                        <span>&#8377; </span>
                        <span th:text="${vm.netBalance}">0.00</span>
                    </div>
                </div>

                <div th:unless="${vm.netPositive}" class="card card-net-neg">
                    <div class="card-label">Net balance</div>
                    <div class="card-value">
                        <span>&#8377; </span>
                        <span th:text="${vm.netBalance}">0.00</span>
                    </div>
                </div>

                <div class="card">
                    <div class="card-label">Categories tracked</div>
                    <div class="card-value" th:text="${vm.categoryCount}">0</div>
                </div>

            </div>

            <div class="charts-row">
                <div class="chart-card">
                    <h2>Monthly trend</h2>
                    <canvas id="trendChart" height="140"></canvas>
                </div>
                <div class="chart-card">
                    <h2>Category breakdown</h2>
                    <canvas id="categoryChart" height="140"></canvas>
                </div>
            </div>

            <div class="table-card">
                <h2 style="padding:16px 16px 8px">Recent activity</h2>
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>Date</th>
                        <th>Category</th>
                        <th>Type</th>
                        <th>Amount</th>
                    </tr>
                    </thead>
                    <tbody>

                    <tr th:each="item : ${vm.recentActivity}">
                        <td th:text="${item.date}">—</td>
                        <td th:text="${item.category}">—</td>
                        <td>
                <span th:if="${item.type != null}"
                      th:text="${item.type.name()}"
                      class="badge"
                      th:class="${item.type.name() == 'INCOME'} ? 'badge badge-income' : 'badge badge-expense'">
                </span>
                        </td>
                        <td>
                            <span>&#8377; </span>
                            <span th:text="${item.amount}">0.00</span>
                        </td>
                    </tr>

                    <tr th:if="${vm.recentActivity.empty}">
                        <td colspan="4" class="empty-row">No records yet.</td>
                    </tr>

                    </tbody>
                </table>
            </div>

        </div>

        <div th:unless="${vm != null}" class="alert alert-danger">
            Dashboard data could not be loaded.
        </div>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<script th:if="${vm != null}" th:inline="javascript">
    /*<![CDATA[*/
    (function() {
        var trends    = /*[[${vm.monthlyTrends}]]*/ [];
        var catKeys   = /*[[${vm.categoryTotals.keySet()}]]*/ [];
        var catVals   = /*[[${vm.categoryTotals.values()}]]*/ [];

        var monthNames = [
            'Jan','Feb','Mar','Apr','May','Jun',
            'Jul','Aug','Sep','Oct','Nov','Dec'
        ];

        var trendEl = document.getElementById('trendChart');
        if (trendEl) {
            if (trends && trends.length > 0) {
                new Chart(trendEl, {
                    type: 'bar',
                    data: {
                        labels: trends.map(function(t) {
                            return monthNames[(t.month || 1) - 1] + ' ' + t.year;
                        }),
                        datasets: [
                            {
                                label: 'Income',
                                data: trends.map(function(t) {
                                    return parseFloat(t.income) || 0;
                                }),
                                backgroundColor: '#1D9E75',
                                borderRadius: 4
                            },
                            {
                                label: 'Expenses',
                                data: trends.map(function(t) {
                                    return parseFloat(t.expenses) || 0;
                                }),
                                backgroundColor: '#D85A30',
                                borderRadius: 4
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { position: 'bottom' } },
                        scales:  { y: { beginAtZero: true } }
                    }
                });
            } else {
                trendEl.parentElement.innerHTML =
                    '<p style="text-align:center;color:#888;padding:40px 0">' +
                    'No trend data yet.</p>';
            }
        }

        var catEl = document.getElementById('categoryChart');
        if (catEl) {
            if (catKeys && catKeys.length > 0) {
                new Chart(catEl, {
                    type: 'doughnut',
                    data: {
                        labels: catKeys,
                        datasets: [{
                            data: catVals.map(function(v) {
                                return parseFloat(v) || 0;
                            }),
                            backgroundColor: [
                                '#378ADD','#1D9E75','#EF9F27','#D85A30',
                                '#7F77DD','#D4537E','#888780','#5DCAA5'
                            ]
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { position: 'bottom' } }
                    }
                });
            } else {
                catEl.parentElement.innerHTML =
                    '<p style="text-align:center;color:#888;padding:40px 0">' +
                    'No category data yet.</p>';
            }
        }
    })();
    /*]]>*/
</script>

</body>
</html>
