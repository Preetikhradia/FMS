<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' — FMS Dashboard'">FMS</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>

<body>

<nav th:fragment="navbar" class="navbar">
    <div class="navbar-brand">FMS Dashboard</div>
    <div class="navbar-user">
        <span th:text="${username}">user</span>
        <span class="role-badge" th:text="${userRole}">ROLE</span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-sm btn-outline">Sign out</button>
        </form>
    </div>
</nav>

<aside th:fragment="sidebar" class="sidebar">
    <ul class="nav-links">

        <li>
            <a th:href="@{/dashboard}">Dashboard</a>
        </li>


        <li sec:authorize="hasAnyRole('ANALYST','ADMIN')">
            <a th:href="@{/records}">Records</a>
        </li>


        <li sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/users}">Users</a>
        </li>

    </ul>


    <div class="sidebar-role-info">
        <div class="role-info-label">Signed in as</div>
        <div class="role-info-value" th:text="${userRole}">ROLE</div>
        <div class="role-info-desc">
            <span th:if="${userRole == 'VIEWER'}">Dashboard access only</span>
            <span th:if="${userRole == 'ANALYST'}">Records + dashboard</span>
            <span th:if="${userRole == 'ADMIN'}">Full access</span>
        </div>
    </div>
</aside>

</body>
</html>
