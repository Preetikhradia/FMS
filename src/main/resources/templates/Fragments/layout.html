<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' — FMS Dashboard'">FMS</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>

<body>

<nav th:fragment="navbar" class="navbar">
    <div class="navbar-brand">FMS Dashboard</div>
    <div class="navbar-user">
        <span th:text="${username}">user</span>
        <span class="role-badge" th:text="${userRole}">ROLE</span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-sm btn-outline">Sign out</button>
        </form>
    </div>
</nav>

<aside th:fragment="sidebar" class="sidebar">
    <ul class="nav-links">
        <li>
            <a th:href="@{/dashboard}" th:text="'Dashboard'">Dashboard</a>
        </li>
        <li>
            <a th:href="@{/records}" th:text="'Records'">Records</a>
        </li>
        <li sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/users}" th:text="'Users'">Users</a>
        </li>
    </ul>
</aside>

</body>
</html>
