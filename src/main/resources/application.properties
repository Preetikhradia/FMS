# ?? Server ??????????????????????????????????????????????????????????????????
server.port=8080

# ?? Database (H2 in-memory ? swap for PostgreSQL in production) ?????????????
spring.datasource.url=jdbc:h2:mem:fmsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=admin
spring.datasource.password=admin

# ?? JPA ?????????????????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ?? H2 console (disable in production) ?????????????????????????????????????
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ?? JWT ??????????????????????????????????????????????????????????????????????
# Must be at least 256 bits (32 characters) for HS256
app.jwt.secret=FMS-super-secret-key-minimum-256bits-change-in-prod!
app.jwt.expiration-ms=86400000

# Thymeleaf (cache off in dev ? set true in prod)
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Spring Security form login uses 'username' field by default
# Your User entity uses 'email' as the username ? CustomUserDetailsService handles this

server.error.include-message=always
server.error.include-stacktrace=always